version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oda_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: oda_redis
    restart: always
    ports:
      - "6379:6379"

  hop:
    image: apache/hop:2.10
    container_name: oda_hop
    environment:
      HOP_PROJECT_NAME: ${HOP_PROJECT_NAME}
      HOP_PROJECT_FOLDER: ${HOP_PROJECT_FOLDER}
      HOP_ENVIRONMENT_NAME: ${HOP_ENVIRONMENT_NAME}
      HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS: ${HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS}
      HOP_RUN_CONFIG: ${HOP_RUN_CONFIG}
      HOP_LOG_LEVEL: ${HOP_LOG_LEVEL}
    volumes:
      - .:/files
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
