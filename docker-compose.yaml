version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: oda_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: oda_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    image: node:20-alpine
    container_name: oda_api
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    ports:
      - "3000:3000"
    command: sh -c "pnpm install && pnpm -F @oda/api start:dev"
    depends_on:
      - postgres
      - redis

  langchain:
    image: node:20-alpine
    container_name: oda_langchain_ts
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPEN_AI_KEY=${OPEN_AI_KEY}
      - LANGCHAIN_PORT=8002
    ports:
      - "8002:8002"
    command: sh -c "pnpm install && pnpm -F @oda/langchain dev"
    depends_on:
      - postgres

  etl:
    image: node:20-alpine
    container_name: oda_etl
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "pnpm install && pnpm -F @oda/etl start"
    depends_on:
      - postgres

volumes:
  postgres_data:
